<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OR Cart Delivery Checklist</title>

<style>
  body { font-family: sans-serif; padding: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 1.1rem; }
  th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
  .delivered { cursor: pointer; font-size: 1.5rem; }
  select { font-size: 1rem; padding: 4px; }
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

</head>
<body>

<h2>OR Cart Delivery Checklist</h2>

<table id="checklist">
  <tr>
    <th>OR</th>
    <th>Cart Type</th>
    <th>Cart #</th>
    <th>Delivered</th>
  </tr>
</table>

<script>
// ------------------------------------------------------
// 1. Firebase config (replace with your own)
// ------------------------------------------------------
const firebaseConfig = {
  apiKey: "AIzaSyBDmO2Spu4ilqRyjvYOmTGt_ZEyvwRgiDY",
  authDomain: "or-cart-list.firebaseapp.com",
  databaseURL: "https://or-cart-list-default-rtdb.firebaseio.com",
  projectId: "or-cart-list",
  storageBucket: "or-cart-list.firebasestorage.app",
  messagingSenderId: "218531135587",
  appId: "1:218531135587:web:9b9ccbd1c29fd329ad7856",
  measurementId: "G-Z5TQ4V52XE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ------------------------------------------------------
// 2. Build table rows
// ------------------------------------------------------
const table = document.getElementById("checklist");

for (let i = 1; i <= 28; i++) {
  const row = document.createElement("tr");

  row.innerHTML = `
    <td>${i}</td>

    <td>
      <select id="type-${i}">
        <option value=""></option>
        <option value="C">C</option>
        <option value="B">B</option>
        <option value="BG">BG</option>
      </select>
    </td>

    <td>
      <select id="num-${i}">
        <option value=""></option>
        ${Array.from({length: 200}, (_, n) => `<option value="${n+1}">${n+1}</option>`).join("")}
      </select>
    </td>

    <td class="delivered" id="del-${i}">⬜</td>
  `;

  table.appendChild(row);

  // Add listeners
  document.getElementById(`type-${i}`).onchange = () => updateRow(i);
  document.getElementById(`num-${i}`).onchange = () => updateRow(i);
  document.getElementById(`del-${i}`).onclick = () => toggleDelivered(i);
}

// ------------------------------------------------------
// 3. Update Firebase when user changes something
// ------------------------------------------------------
function updateRow(i) {
  const type = document.getElementById(`type-${i}`).value;
  const num = document.getElementById(`num-${i}`).value;

  db.ref("checklist/" + i).update({
    type: type,
    num: num
  });
}

function toggleDelivered(i) {
  const cell = document.getElementById(`del-${i}`);
  const newVal = cell.textContent === "⬜" ? "✔️" : "⬜";

  cell.textContent = newVal;

  db.ref("checklist/" + i).update({
    delivered: newVal === "✔️"
  });
}

// ------------------------------------------------------
// 4. Live sync from Firebase → UI
// ------------------------------------------------------
db.ref("checklist").on("value", snapshot => {
  const data = snapshot.val() || {};

  for (let i = 1; i <= 28; i++) {
    const row = data[i] || {};

    document.getElementById(`type-${i}`).value = row.type || "";
    document.getElementById(`num-${i}`).value = row.num || "";
    document.getElementById(`del-${i}`).textContent = row.delivered ? "✔️" : "⬜";
  }
});
</script>

</body>
</html>
